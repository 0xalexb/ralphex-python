name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ralphex_version:
        description: "Ralphex version (e.g. v0.5.2). If omitted, fetches latest from umputun/ralphex."
        required: false
        type: string
      claude_code_version:
        description: "Claude Code version (e.g. v1.0.0). If omitted, fetches latest from anthropics/claude-code."
        required: false
        type: string
      codex_version:
        description: "Codex version (e.g. v0.1.0). If omitted, fetches latest from openai/codex."
        required: false
        type: string
      uv_version:
        description: "UV version (e.g. v0.10.6). If omitted, fetches latest from astral-sh/uv."
        required: false
        type: string
      composer_version:
        description: "Composer version (e.g. 2.8.8). If omitted, fetches latest from composer/composer."
        required: false
        type: string
      phpstan_version:
        description: "PHPStan version (e.g. 2.1.14). If omitted, fetches latest from phpstan/phpstan."
        required: false
        type: string
      go_version:
        description: "Go version (e.g. 1.26.1). If omitted, fetches latest stable from go.dev."
        required: false
        type: string

concurrency:
  group: build-publish
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      repo_version: ${{ steps.repo-version.outputs.version }}
      repo_tag: ${{ steps.repo-version.outputs.tag }}
      ralphex_version: ${{ steps.ralphex-version.outputs.version }}
      claude_code_version: ${{ steps.claude-code-version.outputs.version }}
      codex_version: ${{ steps.codex-version.outputs.version }}
      uv_version: ${{ steps.uv-version.outputs.version }}
      composer_version: ${{ steps.composer-version.outputs.version }}
      phpstan_version: ${{ steps.phpstan-version.outputs.version }}
      go_version: ${{ steps.go-version.outputs.version }}
    steps:
      - name: Resolve repo version
        id: repo-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${RELEASE_TAG}"
          else
            TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve repo version"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve ralphex version
        id: ralphex-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RALPHEX_VERSION: ${{ inputs.ralphex_version }}
        run: |
          if [ -n "${INPUT_RALPHEX_VERSION}" ]; then
            TAG="${INPUT_RALPHEX_VERSION}"
          else
            TAG=$(gh api "repos/umputun/ralphex/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve ralphex version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve Claude Code version
        id: claude-code-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CLAUDE_CODE_VERSION: ${{ inputs.claude_code_version }}
        run: |
          if [ -n "${INPUT_CLAUDE_CODE_VERSION}" ]; then
            TAG="${INPUT_CLAUDE_CODE_VERSION}"
          else
            TAG=$(gh api "repos/anthropics/claude-code/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve Claude Code version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve Codex version
        id: codex-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CODEX_VERSION: ${{ inputs.codex_version }}
        run: |
          if [ -n "${INPUT_CODEX_VERSION}" ]; then
            TAG="${INPUT_CODEX_VERSION}"
          else
            TAG=$(npm view @openai/codex version 2>/dev/null || true)
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve Codex version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve UV version
        id: uv-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_UV_VERSION: ${{ inputs.uv_version }}
        run: |
          if [ -n "${INPUT_UV_VERSION}" ]; then
            TAG="${INPUT_UV_VERSION}"
          else
            TAG=$(gh api "repos/astral-sh/uv/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve UV version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve Composer version
        id: composer-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_COMPOSER_VERSION: ${{ inputs.composer_version }}
        run: |
          if [ -n "${INPUT_COMPOSER_VERSION}" ]; then
            TAG="${INPUT_COMPOSER_VERSION}"
          else
            TAG=$(gh api "repos/composer/composer/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve Composer version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve PHPStan version
        id: phpstan-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PHPSTAN_VERSION: ${{ inputs.phpstan_version }}
        run: |
          if [ -n "${INPUT_PHPSTAN_VERSION}" ]; then
            TAG="${INPUT_PHPSTAN_VERSION}"
          else
            TAG=$(gh api "repos/phpstan/phpstan/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve PHPStan version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve Go version
        id: go-version
        env:
          INPUT_GO_VERSION: ${{ inputs.go_version }}
        run: |
          if [ -n "${INPUT_GO_VERSION}" ]; then
            VERSION="${INPUT_GO_VERSION#v}"
          else
            VERSION=$(curl -sL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::Failed to resolve Go version"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-python:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-versions.outputs.repo_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          REPO_VER: ${{ needs.resolve-versions.outputs.repo_version }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
          PY_VER: ${{ matrix.python_version }}
        run: |
          IMAGE="ghcr.io/0xalexb/ralphex-python"

          TAGS="${IMAGE}:${REPO_VER}-r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:py${PY_VER}"
          if [ "${PY_VER}" = "3.13" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-python/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            RALPHEX_VERSION=${{ needs.resolve-versions.outputs.ralphex_version }}
            UV_VERSION=${{ needs.resolve-versions.outputs.uv_version }}
            CLAUDE_CODE_VERSION=${{ needs.resolve-versions.outputs.claude_code_version }}
            CODEX_VERSION=${{ needs.resolve-versions.outputs.codex_version }}

  build-go:
    needs: resolve-versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-versions.outputs.repo_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          REPO_VER: ${{ needs.resolve-versions.outputs.repo_version }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
        run: |
          IMAGE="ghcr.io/0xalexb/ralphex-go"

          TAGS="${IMAGE}:${REPO_VER}-r${RALPHEX_VER}"
          TAGS="${TAGS},${IMAGE}:r${RALPHEX_VER}"
          TAGS="${TAGS},${IMAGE}:latest"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-go/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            RALPHEX_VERSION=${{ needs.resolve-versions.outputs.ralphex_version }}
            GO_VERSION=${{ needs.resolve-versions.outputs.go_version }}
            CLAUDE_CODE_VERSION=${{ needs.resolve-versions.outputs.claude_code_version }}
            CODEX_VERSION=${{ needs.resolve-versions.outputs.codex_version }}

  build-php:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php_version: ["8.3", "8.4", "8.5"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-versions.outputs.repo_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          REPO_VER: ${{ needs.resolve-versions.outputs.repo_version }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
          PHP_VER: ${{ matrix.php_version }}
        run: |
          IMAGE="ghcr.io/0xalexb/ralphex-php"

          TAGS="${IMAGE}:${REPO_VER}-r${RALPHEX_VER}-php${PHP_VER}"
          TAGS="${TAGS},${IMAGE}:r${RALPHEX_VER}-php${PHP_VER}"
          TAGS="${TAGS},${IMAGE}:php${PHP_VER}"
          if [ "${PHP_VER}" = "8.5" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-php/
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            RALPHEX_VERSION=${{ needs.resolve-versions.outputs.ralphex_version }}
            COMPOSER_VERSION=${{ needs.resolve-versions.outputs.composer_version }}
            PHPSTAN_VERSION=${{ needs.resolve-versions.outputs.phpstan_version }}
            CLAUDE_CODE_VERSION=${{ needs.resolve-versions.outputs.claude_code_version }}
            CODEX_VERSION=${{ needs.resolve-versions.outputs.codex_version }}

  update-tracked-versions:
    needs: [resolve-versions, build-python, build-go, build-php]
    runs-on: ubuntu-latest
    steps:
      - name: Update stored versions
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_VARS_TOKEN }}
          REPO: ${{ github.repository }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
          CLAUDE_CODE_VER: ${{ needs.resolve-versions.outputs.claude_code_version }}
          CODEX_VER: ${{ needs.resolve-versions.outputs.codex_version }}
          UV_VER: ${{ needs.resolve-versions.outputs.uv_version }}
          COMPOSER_VER: ${{ needs.resolve-versions.outputs.composer_version }}
          PHPSTAN_VER: ${{ needs.resolve-versions.outputs.phpstan_version }}
          GO_VER: ${{ needs.resolve-versions.outputs.go_version }}
        run: |
          # Define variable updates: var_name|value
          UPDATES=(
            "RALPHEX_UPSTREAM_VERSION|v${RALPHEX_VER}"
            "CLAUDE_CODE_UPSTREAM_VERSION|v${CLAUDE_CODE_VER}"
            "CODEX_UPSTREAM_VERSION|v${CODEX_VER}"
            "UV_UPSTREAM_VERSION|v${UV_VER}"
            "COMPOSER_UPSTREAM_VERSION|v${COMPOSER_VER}"
            "PHPSTAN_UPSTREAM_VERSION|v${PHPSTAN_VER}"
            "GO_UPSTREAM_VERSION|v${GO_VER}"
          )

          for UPDATE in "${UPDATES[@]}"; do
            IFS='|' read -r VAR_NAME VAR_VALUE <<< "${UPDATE}"

            if ! PATCH_OUTPUT=$(gh api \
              --method PATCH \
              "repos/${REPO}/actions/variables/${VAR_NAME}" \
              --field name="${VAR_NAME}" \
              --field value="${VAR_VALUE}" 2>&1); then
              if echo "${PATCH_OUTPUT}" | grep -q "Not Found"; then
                echo "Variable ${VAR_NAME} not found, creating it"
                gh api \
                  --method POST \
                  "repos/${REPO}/actions/variables" \
                  --field name="${VAR_NAME}" \
                  --field value="${VAR_VALUE}"
              else
                echo "::error::Failed to update variable ${VAR_NAME}: ${PATCH_OUTPUT}"
                exit 1
              fi
            fi
            echo "Updated ${VAR_NAME} to: ${VAR_VALUE}"
          done
