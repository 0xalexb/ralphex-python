name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ralphex_version:
        description: "Ralphex version (e.g. v0.5.2). If omitted, fetches latest from umputun/ralphex."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      repo_version: ${{ steps.repo-version.outputs.version }}
      ralphex_version: ${{ steps.ralphex-version.outputs.version }}
    steps:
      - name: Resolve repo version
        id: repo-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve ralphex version
        id: ralphex-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.ralphex_version }}" ]; then
            TAG="${{ inputs.ralphex_version }}"
          else
            TAG=$(gh api "repos/umputun/ralphex/releases/latest" --jq '.tag_name')
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          REPO_VER="${{ needs.resolve-versions.outputs.repo_version }}"
          RALPHEX_VER="${{ needs.resolve-versions.outputs.ralphex_version }}"
          PY_VER="${{ matrix.python_version }}"
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          TAGS="${IMAGE}:${REPO_VER}-r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:py${PY_VER}"

          if [ "${PY_VER}" = "3.13" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            RALPHEX_VERSION=${{ needs.resolve-versions.outputs.ralphex_version }}
