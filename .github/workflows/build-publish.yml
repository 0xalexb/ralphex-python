name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ralphex_version:
        description: "Ralphex version (e.g. v0.5.2). If omitted, fetches latest from umputun/ralphex."
        required: false
        type: string

concurrency:
  group: build-publish
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      repo_version: ${{ steps.repo-version.outputs.version }}
      repo_tag: ${{ steps.repo-version.outputs.tag }}
      ralphex_version: ${{ steps.ralphex-version.outputs.version }}
    steps:
      - name: Resolve repo version
        id: repo-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${RELEASE_TAG}"
          else
            TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve repo version"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve ralphex version
        id: ralphex-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RALPHEX_VERSION: ${{ inputs.ralphex_version }}
        run: |
          if [ -n "${INPUT_RALPHEX_VERSION}" ]; then
            TAG="${INPUT_RALPHEX_VERSION}"
          else
            TAG=$(gh api "repos/umputun/ralphex/releases/latest" --jq '.tag_name')
          fi
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve ralphex version"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-versions.outputs.repo_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          REPO_VER: ${{ needs.resolve-versions.outputs.repo_version }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
          PY_VER: ${{ matrix.python_version }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE=$(echo "ghcr.io/${REPO}" | tr '[:upper:]' '[:lower:]')

          TAGS="${IMAGE}:${REPO_VER}-r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:r${RALPHEX_VER}-py${PY_VER}"
          TAGS="${TAGS},${IMAGE}:py${PY_VER}"

          if [ "${PY_VER}" = "3.13" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            RALPHEX_VERSION=${{ needs.resolve-versions.outputs.ralphex_version }}

  update-upstream-version:
    needs: [resolve-versions, build]
    runs-on: ubuntu-latest
    steps:
      - name: Update stored upstream version
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_VARS_TOKEN }}
          RALPHEX_VER: ${{ needs.resolve-versions.outputs.ralphex_version }}
          REPO: ${{ github.repository }}
        run: |
          UPSTREAM_TAG="v${RALPHEX_VER}"
          if ! PATCH_OUTPUT=$(gh api \
            --method PATCH \
            "repos/${REPO}/actions/variables/RALPHEX_UPSTREAM_VERSION" \
            --field name=RALPHEX_UPSTREAM_VERSION \
            --field value="${UPSTREAM_TAG}" 2>&1); then
            if echo "${PATCH_OUTPUT}" | grep -q "Not Found"; then
              echo "Variable not found, creating it"
              gh api \
                --method POST \
                "repos/${REPO}/actions/variables" \
                --field name=RALPHEX_UPSTREAM_VERSION \
                --field value="${UPSTREAM_TAG}"
            else
              echo "::error::Failed to update variable: ${PATCH_OUTPUT}"
              exit 1
            fi
          fi
          echo "Updated stored upstream version to: ${UPSTREAM_TAG}"
